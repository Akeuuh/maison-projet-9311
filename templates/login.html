<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Accès — Projet Maison</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f9fafb;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 32px 24px;
        width: 100%;
        max-width: 360px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #111827;
      }
      p.subtitle {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 24px;
      }
      input[type="password"] {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 12px;
        font-size: 16px;
        width: 100%;
        margin-bottom: 12px;
      }
      button {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 12px;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
        font-weight: 600;
      }
      .error {
        color: #ef4444;
        font-size: 14px;
        margin-top: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h1>🏠 Projet Maison</h1>
      <p class="subtitle">Accès privé — visites immobilières</p>
      <input type="password" id="pwd" placeholder="Mot de passe" autofocus />
      <button onclick="checkPwd()">Accéder</button>
      <p class="error" id="err">Mot de passe incorrect</p>
    </div>
    <script>
      const HASH = "{{PASSWORD_HASH}}";
      async function sha256(str) {
        const buf = await crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(str),
        );
        return Array.from(new Uint8Array(buf))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }
      async function checkPwd() {
        const h = await sha256(document.getElementById("pwd").value);
        if (h === HASH) {
          sessionStorage.setItem("maison_auth", "1");
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("err").style.display = "block";
        }
      }
      document.getElementById("pwd").addEventListener("keydown", (e) => {
        if (e.key === "Enter") checkPwd();
      });
    </script>
  </body>
</html>
